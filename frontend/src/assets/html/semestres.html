<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semestres — Acervo Design</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/assets/css/navbar.css">
  <link rel="stylesheet" href="/static/assets/css/semestres.css">
  <link rel="icon" type="image" href="/static/assets/img/logo.png">
</head>
<body>

  <nav class="sidebar d-none d-md-flex">
    <div class="logo"><img src="/static/assets/img/logo.png" alt="" class="logo-design-ifsc"></div>
    <a href="/static/html/home.html"      class="nav-item"><i class="bi bi-house"></i><span>Home</span></a>
    <a href="/static/html/forum.html"     class="nav-item"><i class="bi bi-chat-left-dots"></i><span>Fórum</span></a>
    <a href="/static/html/biblioteca.html"class="nav-item"><i class="bi bi-book"></i><span>Biblioteca</span></a>
    <a href="/static/html/semestres.html" class="nav-item active"><i class="bi bi-bezier2"></i><span>Semestres</span></a>
    <a href="/static/html/trabalhos.html" class="nav-item"><i class="bi bi-clipboard2"></i><span>Trabalhos</span></a>
    <div class="bottom">
      <a href="#" class="nav-item"><i class="bi bi-box-arrow-left"></i><span>Logout</span></a>
    </div>
  </nav>

  <main>
    <h1>Fluxograma</h1>
    <p>Clique em uma disciplina para ver os detalhes.</p>

    <div id="wrapper">
      <div id="fluxograma">
        <!-- SVG fica atrás dos cards — desenhado pelo JS -->
        <svg id="linhas"></svg>
        <!-- colunas injetadas pelo JS -->
      </div>
    </div>
  </main>

  <!-- painel lateral de detalhe -->
  <aside id="detalhe" class="fechado">
    <button id="btn-fechar" onclick="fechar()"><i class="bi bi-x-lg"></i></button>
    <div id="detalhe-corpo"></div>
  </aside>

  <script>
    let ativo = null;

    // ── 1. Busca dados e inicia ──────────────────────────────────
    async function init() {
      const fg = document.getElementById('fluxograma');

      try {
        const res  = await fetch('/api/v1/disciplinas/fluxograma');
        const data = await res.json();
        renderColunas(data.semestres);
        // aguarda o browser calcular layout antes de desenhar linhas
        setTimeout(() => desenharLinhas(data.conexoes), 50);
      } catch {
        fg.innerHTML = '<p class="erro">Erro ao carregar o fluxograma.</p>';
      }
    }

    // ── 2. Monta as colunas + cards ──────────────────────────────
    function renderColunas(semestres) {
      const fg = document.getElementById('fluxograma');
      const nums = Object.keys(semestres).sort((a, b) => +a - +b);

      nums.forEach(n => {
        const col = document.createElement('div');
        col.className = 'col';
        col.innerHTML = `<span class="col-titulo">${n}º sem.</span>`;

        semestres[n].forEach(d => {
          const card = document.createElement('div');
          card.className = 'card';
          card.id = d.codigo;

          const tipo = Array.isArray(d.tipo) ? d.tipo[0] : d.tipo;
          card.dataset.tipo = tipo || 'obrigatoria';
          card.innerHTML = `
            <span class="tipo-tag ${tipo === 'optativa' ? 'optativa' : 'obrigatoria'}">
              ${tipo === 'optativa' ? 'Optativa' : 'Obrigatória'}
            </span>
            <strong>${d.nome}</strong>
            <span>${d.cargaHoraria}h</span>
          `;
          card.addEventListener('click', () => abrirDetalhe(d));
          col.appendChild(card);
        });

        fg.appendChild(col);
      });
    }

    // ── 3. Desenha as linhas SVG ─────────────────────────────────
    // Calcula posição do elemento relativa ao container pai
    function posEm(el, pai) {
      let t = 0, l = 0, curr = el;
      while (curr && curr !== pai) {
        t += curr.offsetTop;
        l += curr.offsetLeft;
        curr = curr.offsetParent;
      }
      return { t, l, w: el.offsetWidth, h: el.offsetHeight };
    }

    function desenharLinhas(conexoes) {
    const svg    = document.getElementById('linhas');
    const fg     = document.getElementById('fluxograma');
    const fgRect = fg.getBoundingClientRect();

    svg.setAttribute('width',  fg.scrollWidth);
    svg.setAttribute('height', fg.scrollHeight);
    svg.innerHTML = '';

    conexoes.forEach(({ de, para }) => {
      const a = document.getElementById(de);
      const b = document.getElementById(para);
      if (!a || !b) return;
      if (b.dataset.tipo === 'optativa') return;

      const ar = a.getBoundingClientRect();
      const br = b.getBoundingClientRect();

      const x1 = ar.right  - fgRect.left;
      const y1 = (ar.top  + ar.bottom)  / 2 - fgRect.top;
      const x2 = br.left   - fgRect.left;
      const y2 = (br.top  + br.bottom)  / 2 - fgRect.top;
      const cx = (x1 + x2) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
      svg.appendChild(path);
    });
  }

    // ── 4. Painel de detalhe ─────────────────────────────────────
    function abrirDetalhe(d) {
      if (ativo) ativo.classList.remove('ativo');
      ativo = document.getElementById(d.codigo);
      ativo.classList.add('ativo');

      const prereqs = d.preRequisitos.length
        ? d.preRequisitos.map(c => `<code>${c}</code>`).join(' ')
        : '—';

      const horarios = d.horarios.length
        ? d.horarios.map(h => `${h.dia} ${h.inicio}–${h.fim}`).join('<br>')
        : '—';

      document.getElementById('detalhe-corpo').innerHTML = `
        <h2>${d.nome}</h2>
        <dl>
          <dt>Código</dt>       <dd>${d.codigo}</dd>
          <dt>Semestre</dt>     <dd>${d.semestre}º</dd>
          <dt>Carga horária</dt><dd>${d.cargaHoraria}h</dd>
          <dt>Professores</dt>  <dd>${d.professores.join(', ') || '—'}</dd>
          <dt>Horários</dt>     <dd>${horarios}</dd>
          <dt>Pré-requisitos</dt><dd>${prereqs}</dd>
          <dt>Ementa</dt>       <dd>${d.ementa}</dd>
        </dl>
      `;

      document.getElementById('detalhe').classList.remove('fechado');
    }

    function fechar() {
      document.getElementById('detalhe').classList.add('fechado');
      if (ativo) { ativo.classList.remove('ativo'); ativo = null; }
    }

    init();
  </script>
</body>
</html>
